apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      tolerations:
        - operator: Exists
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:3.6.11        
          args:
            - "-config.file=/etc/promtail/promtail-config.yaml"  
          volumeMounts:
            - name: log-volume
              mountPath: /var/log
              readOnly: true

            - name: docker-containers
              mountPath: /var/lib/docker/containers
              readOnly: true
    
            - name: promtail-config-vol
              mountPath: /etc/promtail

      volumes:
        - name: log-volume
          hostPath:
            path: /var/log
        - name: docker-containers
          hostPath:
            path: /var/lib/docker/containerssd
        - name: promtail-config-vol
          configMap:
            name: promtail-config
            items:
              - key: promtail-config.yaml  
                path: promtail-config.yaml