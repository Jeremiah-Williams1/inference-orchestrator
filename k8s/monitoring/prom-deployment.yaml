apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: prometheus
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 9090
        
        volumeMounts:
        - name: prometheus-config-vol
          mountPath: /etc/prometheus

      volumes:
      - name: prometheus-config-vol
        configMap:
          name: prometheus-config    