apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "api"
        static_configs:
          - targets: ["inference-svc:8080"]

      - job_name: "pushgateway"
        static_configs:
          - targets: ["pushgateway-svc:9091"]

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources-config
data:
  # The "key" is the filename Grafana will see
  # The '|' means "what follows is a multi-line file"
  prometheus-datasource.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus-svc:9090
      isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
data:
  # You can put multiple files in one ConfigMap!
  default.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: ""
        type: file
        options:
          path: /var/lib/grafana/dashboards
  inference.json: |
    {
      "title": "Inference Orchestrator",
      "uid": "inference-orchestrator",
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Jobs Submitted (total)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(inference_jobs_submitted_total)",
              "legendFormat": "Total Submitted"
            }
          ]
        },
        {
          "id": 2,
          "title": "Jobs Completed (total)",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(inference_jobs_completed_total{status='completed'})",
              "legendFormat": "Completed"
            }
          ]
        },
        {
          "id": 3,
          "title": "Jobs Failed (total)",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(inference_jobs_completed_total{status='failed'})",
              "legendFormat": "Failed"
            }
          ]
        },
        {
          "id": 4,
          "title": "Queue Depth",
          "type": "stat",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(inference_queue_depth)",
              "legendFormat": "Queue Depth"
            }
          ]
        },
        {
          "id": 5,
          "title": "Jobs Submitted Rate (per minute)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(inference_jobs_submitted_total[1m]) * 60",
              "legendFormat": "{{ type }}"
            }
          ]
        },
        {
          "id": 6,
          "title": "Jobs Completed Rate (per minute)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(inference_jobs_completed_total[1m]) * 60",
              "legendFormat": "{{ type }} - {{ status }}"
            }
          ]
        },
        {
          "id": 7,
          "title": "Inference Duration (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 24, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(inference_duration_seconds_bucket[5m]))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, rate(inference_duration_seconds_bucket[5m]))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, rate(inference_duration_seconds_bucket[5m]))",
              "legendFormat": "p99"
            }
          ]
        }
      ],
      "schemaVersion": 36,
      "version": 1
    }
