apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "api"
        static_configs:
          - targets: ["inference-svc:8080"]

      - job_name: "pushgateway"
        static_configs:
          - targets: ["pushgateway-svc:9091"]
